worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 25M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    upstream django {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;

        # ── Django backend API & auth ──────────────────────────
        location ~ ^/(api|auth|accounts|django-admin|health|slack|django-static|media)/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
        }

        # ── React SPA + all its static assets ─────────────────
        # /static/js/, /static/css/, /static/media/ are all React build output
        # served directly from nginx - no proxy needed
        location / {
            root /usr/share/nginx/html;
            index index.html;
            
            # For JS/CSS/images: serve directly, 404 if not found (don't fallback to index.html)
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
                root /usr/share/nginx/html;
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
                try_files $uri =404;
            }

            # For all other paths: fallback to index.html (React Router handles it)
            try_files $uri $uri/ /index.html;
        }
    }
}
