services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: helpdesk_backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend/data:/app/data
      - static_volume:/app/staticfiles
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8000/health/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: helpdesk_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - static_volume:/static:ro
    depends_on:
      backend:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: helpdesk_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  static_volume:
  redis_data:
