version: "3.8"

services:
  backend:
    build: ./backend
    container_name: mindstorm-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    volumes:
      - ticket-data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: mindstorm-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ticket-data:
